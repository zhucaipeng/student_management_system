<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; transition: all 0.3s; }
        .btn-logout { background: rgba(255,255,255,0.2); }
        .btn-logout:hover { background: rgba(255,255,255,0.3); }
        .btn-primary { background: #667eea; }
        .btn-success { background: #38c172; }
        .btn-danger { background: #e3342f; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        .hidden { display: none !important; }
        .container { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 200px; background: white; box-shadow: 2px 0 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.3s; color: #333; font-size: 16px; }
        .menu-item:hover { background: #f5f5f5; border-left-color: #667eea; }
        .menu-item.active { background: #eef2ff; color: #667eea; border-left-color: #667eea; font-weight: bold; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: bold; color: #333; }
        .action-btns { display: flex; gap: 5px; }
        .message { padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
e<body>
    <div class="header">
        <h1>学生管理系统</h1>
        <div class="header-right">
            <span id="userInfo"></span>
            <button class="btn btn-logout" onclick="logout()">退出登录</button>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div class="menu-item active" onclick="showSection('class', event)">班级管理</div>
            <div class="menu-item" onclick="showSection('student', event)">学生管理</div>
            <div class="menu-item" onclick="showSection('score', event)">成绩管理</div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
